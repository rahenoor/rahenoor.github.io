<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>همراه نماز</title>

<style>

body{
font-family:Tahoma,Arial;
background:#eef7f4;
margin:0;
}

.app{
max-width:500px;
margin:auto;
padding:15px;
}

header{
background:#00796b;
color:white;
padding:20px;
border-radius:20px;
text-align:center;
}

.card{
background:white;
margin-top:15px;
padding:20px;
border-radius:20px;
box-shadow:0 3px 10px #ccc;
}

button,select{
background:#00897b;
color:white;
border:0;
padding:12px;
border-radius:12px;
font-size:16px;
margin:5px;
}

.time{
display:flex;
justify-content:space-between;
background:#e0f2f1;
padding:12px;
margin:8px 0;
border-radius:10px;
}

.counter{
font-size:45px;
text-align:center;
}

.ayah{
font-size:19px;
line-height:2.5;
}

</style>

</head>

<body>

<div class="app">

<header>
<h1>🕌 همراه نماز</h1>
<p id="date"></p>
</header>


<div class="card">

<h2>🕋 اوقات شرعی</h2>

<button onclick="getLocation()">📍 تشخیص موقعیت</button>

<p id="place">مکان: نامشخص</p>

<div class="time">
اذان صبح
<span id="fajr">--</span>
</div>

<div class="time">
طلوع آفتاب
<span id="sunrise">--</span>
</div>

<div class="time">
اذان ظهر
<span id="dhuhr">--</span>
</div>

<div class="time">
اذان مغرب
<span id="maghrib">--</span>
</div>

</div>


<div class="card">

<h2>📿 تسبیح</h2>

<div class="counter" id="count">0</div>

<button onclick="addZekr()">ذکر</button>

<button onclick="resetZekr()">پاک کردن</button>

</div>


<div class="card">

<h2>📖 قرآن کریم</h2>

<select id="surahs" onchange="loadSurah()">

<option>
انتخاب سوره
</option>

</select>


<div id="quran"></div>

<audio id="audio" controls></audio>


</div>


<div class="card">

<h2>📅 مناسبت امروز</h2>

<div id="events">
در حال دریافت...
</div>

</div> <script>


// تاریخ

document.getElementById("date").innerHTML =
"📅 " + new Date().toLocaleDateString("fa-IR");



// --------------------
// اوقات شرعی
// --------------------

function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;


document.getElementById("place").innerHTML =
"📍 موقعیت دریافت شد";


fetch(
`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=7`
)

.then(res=>res.json())

.then(data=>{

let t=data.data.timings;


document.getElementById("fajr").innerHTML=t.Fajr;

document.getElementById("sunrise").innerHTML=t.Sunrise;

document.getElementById("dhuhr").innerHTML=t.Dhuhr;

document.getElementById("maghrib").innerHTML=t.Maghrib;


});


});

}




// --------------------
// تسبیح
// --------------------

let count=0;


function addZekr(){

count++;

document.getElementById("count").innerHTML=count;

}


function resetZekr(){

count=0;

document.getElementById("count").innerHTML=0;

}





// --------------------
// قرآن
// --------------------

let surahs=[];


fetch("https://api.alquran.cloud/v1/surah")

.then(r=>r.json())

.then(data=>{


surahs=data.data;


let select=document.getElementById("surahs");


surahs.forEach(s=>{


let option=document.createElement("option");


option.value=s.number;


option.innerHTML=
s.number+" - "+s.name;


select.appendChild(option);


});


});





let audioFiles=[];
let audioIndex=0;



function loadSurah(){


let number=document.getElementById("surahs").value;


if(!number) return;



// متن کامل سوره

fetch(
`https://api.alquran.cloud/v1/surah/${number}/quran-uthmani`
)

.then(r=>r.json())

.then(data=>{


let box=document.getElementById("quran");

box.innerHTML="";


data.data.ayahs.forEach(a=>{


box.innerHTML+=`

<p class="ayah">

${a.text}

<br>

<b>(${a.numberInSurah})</b>

</p>

<hr>

`;


});


});



// دریافت صوت آیات

fetch(
`https://api.alquran.cloud/v1/surah/${number}/ar.alafasy`
)

.then(r=>r.json())

.then(data=>{


audioFiles =
data.data.ayahs.map(a=>a.audio);


audioIndex=0;


playAudio();


});


}



function playAudio(){


if(audioIndex>=audioFiles.length)
return;


let player=document.getElementById("audio");


player.src=audioFiles[audioIndex];


player.play();


player.onended=function(){

audioIndex++;

playAudio();

};


}// --------------------
// مناسبت های امروز
// --------------------


function loadEvents(){


let today = new Date();


let day =
today.getDate();

let month =
today.getMonth()+1;

let year =
today.getFullYear();



fetch(
`https://api.aladhan.com/v1/gToH?gregorian_day=${day}&gregorian_month=${month}&gregorian_year=${year}`
)

.then(res=>res.json())

.then(data=>{


let hijri =
data.data.hijri;



let events =
hijri.holidays;



if(events.length>0){


document.getElementById("events").innerHTML =
events.map(e=>"📌 "+e).join("<br>");


}

else{


document.getElementById("events").innerHTML =
"امروز مناسبت خاصی ثبت نشده است";


}



});


}


loadEvents();



</script>


</div>

</body>

</html>
